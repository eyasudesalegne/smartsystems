
version: '3.9'
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: control_plane
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ['5432:5432']
    volumes:
      - pgdata:/var/lib/postgresql/data
  ollama:
    image: ollama/ollama:latest
    ports: ['11434:11434']
    volumes:
      - ollama:/root/.ollama
  service:
    build: ../service
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/control_plane
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on: [postgres, ollama]
    ports: ['8000:8000']
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
  worker:
    build: ../service
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/control_plane
      OLLAMA_BASE_URL: http://ollama:11434
      WORKER_ID: phase2-worker-1
    depends_on: [postgres, ollama, service]
    command: python -m app.worker
volumes:
  pgdata: {}
  ollama: {}
